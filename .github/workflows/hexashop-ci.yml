name: Hexashop CI/CD

on:
  push:
    branches:
      - "**"
    paths:
      - "SoftwareProjectHexashop/**"
      - ".github/workflows/hexashop-ci.yml"
  pull_request:
    paths:
      - "SoftwareProjectHexashop/**"
      - ".github/workflows/hexashop-ci.yml"
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SoftwareProjectHexashop

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build and run tests
        run: ./mvnw clean verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: SoftwareProjectHexashop/target/surefire-reports/
          if-no-files-found: ignore

  docker-build-and-push:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build application jar
        working-directory: SoftwareProjectHexashop
        run: ./mvnw clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: arkanath55/cse_3220_hexashop_software_project
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: SoftwareProjectHexashop
          file: SoftwareProjectHexashop/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Validate Render deploy hook secret
        if: success()
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "::error::Missing GitHub secret RENDER_DEPLOY_HOOK_URL"
            exit 1
          fi

      - name: Trigger Render Deployment
        if: success()
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
