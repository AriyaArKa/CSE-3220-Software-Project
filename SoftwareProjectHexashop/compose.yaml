services:
  postgres:
    image: postgres:16-alpine
    container_name: hexashop-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hexashopdb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-hexashopdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: arkanath55/cse_3220_hexashop_software_project:tagname
    container_name: hexashop-app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/hexashopdb}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-change_me}
      APP_LOGIN_USER: ${APP_LOGIN_USER:-admin}
      APP_LOGIN_PASSWORD: ${APP_LOGIN_PASSWORD:-admin123}
      PORT: ${PORT:-8080}
    ports:
      - "8080:8080"

volumes:
  postgres_data:
