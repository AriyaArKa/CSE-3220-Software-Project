services:
  postgres:
    image: postgres:16-alpine
    container_name: hexashop-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-cse_3220_SoftwareProjectHexaShop}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
      POSTGRES_USER: ${DB_USER:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-cse_3220_SoftwareProjectHexaShop}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: arkanath55/cse_3220_hexashop_software_project:tagname
    container_name: hexashop-app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-cse_3220_SoftwareProjectHexaShop}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-change_me}
      SERVER_PORT: ${SERVER_PORT:-8080}
    ports:
      - "8080:8080"

volumes:
  postgres_data:
