spring:
  application:
    name: SoftwareProjectHexashop
  security:
    user:
      name: ${APP_LOGIN_USER:admin}
      password: ${APP_LOGIN_PASSWORD:admin123}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:cse_3220_SoftwareProjectHexaShop}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:change_me}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  thymeleaf:
    cache: false

server:
  port: 8080

app:
  seed-demo-data: true
